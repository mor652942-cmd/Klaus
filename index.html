<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klaus</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #111;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 420px;
            text-align: center;
        }

        pre {
            background: #1b1b1b;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 20px;
            color: #ddd;
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .buttons {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            background: #2c7be5;
            color: white;
            padding: 14px;
            border-radius: 8px;
            font-size: 18px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #1f5fb8;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

<div class="container">

<pre>
=====================================
            Klaus
   Sistema atual: Klaus 1

Versão atual: 26k1
Build atual: 1.7.2026
=====================================
</pre>

<div class="buttons">
    <a href="#" class="btn">📥 Download</a>
    <a href="#" class="btn">📝 Builds</a>
    <a href="#" class="btn">📚 Documentação</a>
    <a href="#" class="btn">ℹ️ Sobre</a>
</div>

</div>

</body>
</html>
